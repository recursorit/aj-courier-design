<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>A.J. Courier — Atlantic (Direction 01)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  *, *::before, *::after { box-sizing: border-box; }
</style>

<style id="mobile-responsive">
/* ========== RESPONSIVE: desktop defaults stay via inline styles ========== */

@media (max-width: 900px) {
  html, body { overflow-x: hidden !important; }
  body * { max-width: 100vw; }

  /* Kill huge paddings */
  body [style*="padding"] { /* generic guard, overridden below */ }

  /* All multi-column inline grids -> single column */
  [style*="grid-template-columns"] { grid-template-columns: 1fr !important; gap: 20px !important; }

  /* Sticky -> static so content flows */
  [style*="position: sticky"], [style*="position:sticky"] { position: static !important; top: auto !important; }

  /* Tables horizontal scroll */
  table { display: block !important; overflow-x: auto !important; white-space: nowrap !important; font-size: 12px !important; max-width: 100% !important; }
  th, td { padding: 10px 12px !important; }

  /* Type scaling — using element selectors, not brittle attr selectors */
  h1 { font-size: clamp(34px, 9vw, 52px) !important; line-height: 1.05 !important; letter-spacing: -0.02em !important; word-break: break-word; }
  h2 { font-size: clamp(26px, 7vw, 40px) !important; line-height: 1.1 !important; }
  h3 { font-size: clamp(18px, 5vw, 24px) !important; }
  h4 { font-size: clamp(16px, 4.5vw, 20px) !important; }
  blockquote { font-size: clamp(20px, 5.5vw, 30px) !important; line-height: 1.3 !important; }

  /* Form inputs */
  input, textarea, select { max-width: 100% !important; box-sizing: border-box !important; width: 100% !important; }

  /* Hide via classes added by our JS tagger */
  .__mobile-hide { display: none !important; }
  .__mobile-flex-wrap { flex-wrap: wrap !important; gap: 10px !important; }
  .__mobile-full { width: 100% !important; }
  .__mobile-stack { display: flex !important; flex-direction: column !important; align-items: flex-start !important; gap: 10px !important; }

  /* Header: we tag it with __mobile-header */
  .__mobile-header { padding: 14px 16px !important; flex-wrap: wrap !important; gap: 10px !important; row-gap: 10px !important; }
  .__mobile-header > * { flex: 0 0 auto; }
  .__mobile-header nav { order: 99 !important; width: 100% !important; flex-wrap: wrap !important; gap: 6px !important; padding-top: 8px !important; border-top: 1px solid rgba(0,0,0,0.08); }
  .__mobile-header nav button { font-size: 13px !important; padding: 6px 10px !important; }
  .__mobile-header button { font-size: 12px !important; }

  /* Reduce absolute positioned decorative elements */
  aside[style*="position: absolute"], .decorative-abs { display: none !important; }

  /* Generic scale on very large inline font sizes — use JS to find and override */
}

@media (max-width: 600px) {
  /* Buttons stack */
  button { max-width: 100% !important; }
}
</style>

<script>
/* Post-mount tagger: runs repeatedly so that React re-renders don't lose tags. */
(function() {
  function tag() {
    // 1. Top utility ribbon: first element in body that has dark bg and tiny text
    document.querySelectorAll('body > div > div, #root > div > div').forEach(function(el, i) {
      if (el.dataset.mTagged) return;
      var s = getComputedStyle(el);
      var bg = s.backgroundColor;
      var fs = parseFloat(s.fontSize);
      // Dark navy/black ribbon with small text at the top of page
      if (fs && fs < 14 && (bg.includes('rgb(11') || bg.includes('rgb(15') || bg.includes('rgb(17') || bg.includes('rgb(10') || bg.includes('rgb(0,') || bg.includes('rgb(26'))) {
        var rect = el.getBoundingClientRect();
        if (rect.top < 100 && rect.height < 80) {
          el.classList.add('__mobile-hide');
          el.dataset.mTagged = '1';
        }
      }
    });

    // 2. Headers — first <header> element
    document.querySelectorAll('header').forEach(function(h) {
      if (h.dataset.mTagged) return;
      // find the flex row child
      var row = h.querySelector(':scope > div') || h;
      row.classList.add('__mobile-header');
      h.dataset.mTagged = '1';
    });

    // 3. Scale down any element with huge inline font-size on mobile
    if (window.innerWidth <= 900) {
      document.querySelectorAll('[style*="font-size"],[style*="fontSize"]').forEach(function(el) {
        if (el.dataset.mFont) return;
        var inline = el.style.fontSize;
        if (!inline) return;
        var m = inline.match(/^(d+(?:.d+)?)(px|pt|rem|em)?$/);
        if (!m) return;
        var v = parseFloat(m[1]);
        if (m[2] === 'px' || !m[2]) {
          if (v >= 120) {
            el.style.setProperty('font-size', 'clamp(40px, 11vw, 64px)', 'important');
            el.style.setProperty('line-height', '1.02', 'important');
          } else if (v >= 72) {
            el.style.setProperty('font-size', 'clamp(32px, 8vw, 48px)', 'important');
            el.style.setProperty('line-height', '1.05', 'important');
          } else if (v >= 44) {
            el.style.setProperty('font-size', 'clamp(24px, 6vw, 36px)', 'important');
            el.style.setProperty('line-height', '1.1', 'important');
          } else if (v >= 30) {
            el.style.setProperty('font-size', 'clamp(20px, 5vw, 28px)', 'important');
          }
          el.dataset.mFont = '1';
        }
      });

      // Scale big paddings
      document.querySelectorAll('[style*="padding"]').forEach(function(el) {
        if (el.dataset.mPad) return;
        var p = el.style.padding;
        if (!p) return;
        // if contains a big number
        var nums = (p.match(/d+/g) || []).map(Number);
        if (nums.some(function(n) { return n >= 60; })) {
          el.style.setProperty('padding', '40px 20px', 'important');
          el.dataset.mPad = '1';
        } else if (nums.some(function(n) { return n >= 32; })) {
          el.style.setProperty('padding', '24px 16px', 'important');
          el.dataset.mPad = '1';
        }
      });

      // Scale big gaps
      document.querySelectorAll('[style*="gap"]').forEach(function(el) {
        if (el.dataset.mGap) return;
        var g = el.style.gap;
        if (!g) return;
        var n = parseFloat(g);
        if (n >= 60) { el.style.setProperty('gap', '28px', 'important'); el.dataset.mGap = '1'; }
        else if (n >= 36) { el.style.setProperty('gap', '20px', 'important'); el.dataset.mGap = '1'; }
      });

      // border-right on stat columns -> border-bottom
      document.querySelectorAll('[style*="border-right"],[style*="borderRight"]').forEach(function(el) {
        if (el.dataset.mBorder) return;
        el.style.setProperty('border-right', 'none', 'important');
        el.style.setProperty('border-bottom', '1px solid rgba(0,0,0,0.08)', 'important');
        el.dataset.mBorder = '1';
      });
    }
  }

  // Run on load and periodically (cheap, catches React re-renders)
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tag);
  } else {
    tag();
  }
  setInterval(tag, 800);
  window.addEventListener('resize', tag);
})();
</script>
</head>

window.Illu = Illu;

</script>
<script type="text/babel">
/* Direction 1: Atlantic — Editorial logistics */
/* A thin, confident, type-led design. Deep navy + signal red. Serif display + clean grotesque. */

const D1_TOKENS = {
  ink: "#0B1A2B",          // deep navy ink
  ink2: "#27384C",
  paper: "#F7F4EE",        // warm off-white
  paper2: "#EFEAE0",
  red: "#C8102E",          // signal red (evolved from existing)
  rust: "#8C2A1F",
  rule: "#1A2A3D",
  muted: "#6E7C8E",
};

/* ---------- Layout chrome ---------- */

const D1Topbar = ({ current, onNav }) => (
  <div style={{
    background: D1_TOKENS.ink, color: D1_TOKENS.paper, fontSize: 12,
    letterSpacing: '0.08em', textTransform: 'uppercase',
    borderBottom: `1px solid rgba(255,255,255,0.08)`,
  }}>
    <div style={{ maxWidth: 1280, margin: '0 auto', padding: '8px 32px', display: 'flex', justifyContent: 'space-between' }}>
      <span style={{ opacity: 0.7 }}>Tri-state · Toronto · Georgetown · Port of Spain · Kingston</span>
      <div style={{ display: 'flex', gap: 24, opacity: 0.85 }}>
        <span>EN · ES</span>
        <span>+1 (718) 555-0142</span>
        <span>Open today · 8a–7p</span>
      </div>
    </div>
  </div>
);

const D1Nav = ({ current, onNav }) => {
  const items = ['Home', 'Services', 'Tracking', 'Quote', 'About', 'Contact'];
  return (
    <header style={{
      background: D1_TOKENS.paper, borderBottom: `1px solid ${D1_TOKENS.ink}`,
      position: 'sticky', top: 0, zIndex: 50,
    }}>
      <div style={{
        maxWidth: 1280, margin: '0 auto', padding: '20px 32px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <button onClick={() => onNav('Home')} style={{
          all: 'unset', cursor: 'pointer', display: 'flex', alignItems: 'baseline', gap: 12,
        }}>
          <span style={{
            fontFamily: '"Fraunces", "Times New Roman", serif',

<script type="text/babel" data-presets="env,react">
function useHashNav() {
  const parse = () => (window.location.hash.replace('#/', '').replace('#', '') || 'Home');
  const [page, setPage] = React.useState(parse());
  React.useEffect(() => {
    const onHash = () => { setPage(parse()); window.scrollTo(0, 0); };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const onNav = (p) => { window.location.hash = '#/' + p; window.scrollTo(0, 0); };
  return [page, onNav];
}

function App() {
  const [page, onNav] = useHashNav();
  const Page = {
    Home: <D1Home onNav={onNav} />,
    Services: <D1Services onNav={onNav} />,
    Tracking: <D1Tracking onNav={onNav} />,
    Quote: <D1Quote onNav={onNav} />,
    About: <D1About onNav={onNav} />,
    Contact: <D1Contact onNav={onNav} />,
  }[page] || <D1Home onNav={onNav} />;
  return (
    <div style={{ background: D1_TOKENS.paper, minHeight: '100vh' }}>
      <D1Topbar />
      <D1Nav current={page} onNav={onNav} />
      {Page}
      <D1Footer />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
